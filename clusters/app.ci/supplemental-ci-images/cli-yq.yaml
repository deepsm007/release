kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  namespace: ocp
  name: cli-yq
spec:
  successfulBuildsHistoryLimit: 1
  failedBuildsHistoryLimit: 2
  output:
    pushSecret:
      name: registry-push-credentials-ci-images-mirror
    to:
      kind: DockerImage
      name: quay.io/openshift/ci:ocp_cli-yq_latest
  source:
    dockerfile: |
      FROM ocp/4.18:cli
      # Install yq for the same CPU architecture as the base image (supports multi-arch builds).
      RUN ARCH=$(uname -m) && \
          case "$ARCH" in \
              x86_64) YQ_ARCH=amd64 ;; \
              aarch64) YQ_ARCH=arm64 ;; \
              ppc64le) YQ_ARCH=ppc64le ;; \
              s390x) YQ_ARCH=s390x ;; \
              *) echo "unsupported architecture: $ARCH" && exit 1 ;; \
          esac && \
          curl -fsSL "https://github.com/mikefarah/yq/releases/latest/download/yq_linux_${YQ_ARCH}" -o /usr/local/bin/yq && \
          chmod +x /usr/local/bin/yq
      RUN yum install -y jq
    type: Dockerfile
  strategy:
    dockerStrategy:
      from:
        kind: ImageStreamTag
        name: 4.18:cli
        namespace: ocp
      imageOptimizationPolicy: SkipLayers
    type: Docker
  triggers:
    - type: ConfigChange
